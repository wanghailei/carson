name: Release

on:
  push:
    branches: [main]
    paths: [VERSION]
  workflow_dispatch:

jobs:
  release:
    name: Tag, release, publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          version=$(cat VERSION | tr -d '[:space:]')
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Check if tag exists
        id: tag_check
        run: |
          if git ls-remote --tags origin "refs/tags/${{ steps.version.outputs.tag }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract release notes
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          version="${{ steps.version.outputs.version }}"
          awk -v ver="$version" '
            BEGIN { found=0; printing=0 }
            /^## / {
              if (printing) exit
              if (index($0, ver)) { found=1; printing=1; next }
            }
            /^---$/ { if (printing) exit }
            printing { print }
          ' RELEASE.md > /tmp/release_notes.md
          if [ ! -s /tmp/release_notes.md ]; then
            echo "Release $version" > /tmp/release_notes.md
          fi

      - name: Create tag and GitHub release
        if: steps.tag_check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "Carson ${{ steps.version.outputs.version }}" \
            --notes-file /tmp/release_notes.md

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0"

      - name: Check if gem version exists on RubyGems
        id: gem_check
        run: |
          if gem info carson --remote --exact --all 2>/dev/null | grep -q "${{ steps.version.outputs.version }}"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure RubyGems credentials
        if: steps.gem_check.outputs.exists == 'false'
        uses: rubygems/configure-rubygems-credentials@v1.0.0

      - name: Build and publish gem to RubyGems
        if: steps.gem_check.outputs.exists == 'false'
        run: |
          gem build carson.gemspec
          gem push carson-${{ steps.version.outputs.version }}.gem
